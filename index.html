<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Devine Cards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      background: black;
    }

    .hero {
      text-align: center;
      padding: 50px 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1a1a1a;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  Devine Wedding Cards 💍
</header>

<section class="hero">
  <h1>Premium Digital Wedding Invitations</h1>
  <p>Customize & Get Delivered on WhatsApp</p>
</section>

<section class="cards">

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Royal Wedding Card</h3>
    <p>₹499</p>
    <button onclick="orderNow()">Order Now</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/300x200">
    <h3>Modern Invite</h3>
    <p>₹299</p>
    <button onclick="orderNow()">Order Now</button>
  </div>

</section>

<script>
function orderNow() {
  window.open("https://wa.me/91XXXXXXXXXX?text=Hi%20I%20want%20to%20order%20a%20wedding%20card");
}
</script>

</body>
</html>
